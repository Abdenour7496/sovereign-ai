version: "3.9"

# Sovereign AI Infrastructure - Proof of Concept
# Benefits Eligibility Vertical Slice
# Model Routing: Claude Haiku (simple) → Sonnet (medium) → Opus (complex)
#
# OpenWebUI Integration (already running on port 3000):
#   Settings → Admin Panel → Settings → Connections → Add OpenAI API
#   URL: http://host.docker.internal:8100/v1
#   Key: sovereign-ai

networks:
  sovereign-net:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  postgres-data:
  prometheus-data:
  grafana-data:

services:
  # ─────────────────────────────────────────────────────────────
  # SOVEREIGN BRAIN — Core Orchestration Service
  # OpenAI-compatible API → add as external connection in OpenWebUI
  # ─────────────────────────────────────────────────────────────
  sovereign-brain:
    build:
      context: ./sovereign-brain
      dockerfile: Dockerfile
    container_name: sovereign-brain
    restart: unless-stopped
    ports:
      - "8100:8100"      # OpenAI-compatible API (add to OpenWebUI)
      - "9100:9100"      # Prometheus metrics
    environment:
      # LLM Backend (Claude API — model tiers)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_TIER1_MODEL: claude-haiku-4-5-20251001
      LLM_TIER2_MODEL: claude-sonnet-4-6
      LLM_TIER3_MODEL: claude-sonnet-4-6
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sovereign2026}
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: sovereign-policy-docs
      # Postgres (audit) — built from parts so password env var is respected
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sovereign_audit
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereign2026}
      # App
      APP_HOST: 0.0.0.0
      APP_PORT: 8100
      METRICS_PORT: 9100
      LOG_LEVEL: INFO
      # Routing thresholds
      ROUTER_TIER1_MAX_SCORE: 20
      ROUTER_TIER2_MAX_SCORE: 45
      # Audit access control — RBAC keys (empty = dev mode, no auth)
      AUDIT_API_KEY: ${AUDIT_API_KEY:-}
      AUDIT_KEY_AUDITOR: ${AUDIT_KEY_AUDITOR:-}
      AUDIT_KEY_SECURITY_OFFICER: ${AUDIT_KEY_SECURITY_OFFICER:-}
      AUDIT_KEY_ADMIN: ${AUDIT_KEY_ADMIN:-}
      SECURE_MODE: ${SECURE_MODE:-false}
      MODE: ${MODE:-connected}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      # CORS origins (comma-separated)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080,http://open-webui:8080}
    networks:
      - sovereign-net
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    security_opt:
      - "no-new-privileges:true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────
  # NEO4J — Structured Policy Graph
  # Policy rules, eligibility conditions, legal clauses
  # Browser: http://localhost:7474  (neo4j / ${NEO4J_PASSWORD})
  # ─────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: sovereign-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sovereign2026}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./neo4j/seed:/var/lib/neo4j/import
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # QDRANT — Vector Database for Policy Document RAG
  # ─────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.8.3
    container_name: sovereign-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - sovereign-net
    environment:
      QDRANT__LOG_LEVEL: INFO

  # ─────────────────────────────────────────────────────────────
  # POSTGRES — Audit Logs, Sessions, Structured State
  # Exposed on 5433 to avoid conflict with any existing Postgres
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sovereign-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sovereign_audit
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereign2026}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    security_opt:
      - "no-new-privileges:true"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d sovereign_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # PROMETHEUS — Metrics Collection
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sovereign-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - sovereign-net

  # ─────────────────────────────────────────────────────────────
  # GRAFANA — Dashboards (Engineering + AI Governance)
  # URL: http://localhost:3001  (admin / ${GRAFANA_PASSWORD})
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: sovereign-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"   # 3001 avoids conflict with OpenWebUI on 3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sovereign2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - sovereign-net
    depends_on:
      - prometheus
