name: Supply Chain Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am — catch new CVEs on unchanged code
  workflow_dispatch:       # Manual trigger via API or GitHub UI

permissions:
  contents: read
  id-token: write         # Required for keyless cosign OIDC signing
  packages: write         # Required to push to ghcr.io
  security-events: write  # Required for SARIF upload to GitHub Security tab

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/abdenour7496/sovereign-brain

jobs:
  supply-chain:
    name: Scan · SBOM · Sign
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Registry Login ──────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & Push ────────────────────────────────────────
      - name: Build and push sovereign-brain image
        uses: docker/build-push-action@v5
        with:
          context: ./sovereign-brain
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # ── Vulnerability Scanning ──────────────────────────────
      - name: Scan with Trivy (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL

      - name: Scan with Trivy (SARIF — uploads to Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ── SBOM Generation ────────────────────────────────────
      - name: Create output directory
        run: mkdir -p security-reports

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: security-reports/sbom-cyclonedx.json

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: security-reports/sbom-spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: security-reports/
          retention-days: 90

      # ── Image Signing ──────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC via GitHub Actions)
        run: cosign sign --yes ${{ env.IMAGE }}:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "1"
